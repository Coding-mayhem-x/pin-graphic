<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Honeycomb Circles Simulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside class="side">
      <h1>Kontrola</h1>
      `<div class="panel">
        <button id="btnAddOne">Add one</button>
        <button id="btnAddSix">Add six</button>
        <button id="btnAddRing">Add ring</button>
        <button id="btnReset" class="danger">Reset</button>`r`n        <button id="btnAddRng">Add RNG</button>
      </div>
      <div class="info">
        <div><strong>Srednica (px):</strong> <span id="diameterPx">-</span></div>
        <div><strong>Obszar (srednice):</strong> 90 × 60</div>
        <div><strong>Kola:</strong> <span id="count">0</span></div>
      </div>
          <section class="palette">
        <h2>Kolory</h2>
                        <div class="palette-controls">
          <select id="paletteSelect" title="Wybór koloru">  <option value="clock3">Clock v3</option></select>
          <select id="strategySelect" title="Strategia">
            <option value="frontier">Frontier</option>
            <option value="clock">Clock</option>
            <option value="clock2">Clock v2</option>  <option value="clock3">Clock v3</option></select>
          <button id="btnAddRandomColor">Add random (selected)</button>
          <button id="btnAddRandomAny">Add random (any)</button>
        </div>
        <div class="palette-list" id="paletteList"></div>
        <div class="palette-actions">
          <button id="btnPaletteAdd">Add color</button>
          <button id="btnPaletteReset" class="danger">Reset palette</button>
        </div>
            <section class="runner">
        <h2>Auto</h2>
        <div class="runner-controls">
          <button id="btnPlay" title="Play"><svg class="icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg></button>
          <button id="btnPause" title="Pause"><svg class="icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg></button>
          <button id="btnSpeedDown" title="Slower"><svg class="icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg></button>
          <button id="btnSpeedUp" title="Faster"><svg class="icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg></button>
          <span class="speed" id="speedLabel">5×/s</span>
        </div>
      </section></section></aside>
    <main class="stage">
      <div id="svgHost" class="host" aria-label="obszar rysowania"></div>
    </main>
  </div>
  <script src="app.js"></script>

  <script>
  (function(){
    var runner = { timer:null, interval:200, label:null,
      update:function(){ if(this.label){ this.label.textContent=((1000/this.interval).toFixed(1))+'×/s'; } },
      start:function(){ if(this.timer) return; var self=this; this.timer = setInterval(function(){ var btn=document.getElementById('btnAddRandomAny'); if(btn) btn.click(); }, this.interval); },
      stop:function(){ if(this.timer){ clearInterval(this.timer); this.timer=null; } },
      faster:function(){ this.interval=Math.max(40, Math.round(this.interval*0.7)); var active=!!this.timer; this.stop(); this.update(); if(active) this.start(); },
      slower:function(){ this.interval=Math.min(5000, Math.round(this.interval/0.7)); var active=!!this.timer; this.stop(); this.update(); if(active) this.start(); }
    };
    document.addEventListener('DOMContentLoaded', function(){
      runner.label = document.getElementById('speedLabel'); if(runner.label) runner.update();
      var play=document.getElementById('btnPlay'); var pause=document.getElementById('btnPause');
      var up=document.getElementById('btnSpeedUp'); var down=document.getElementById('btnSpeedDown');
      if(play) play.onclick=function(){ runner.start(); };
      if(pause) pause.onclick=function(){ runner.stop(); };
      if(up) up.onclick=function(){ runner.faster(); };
      if(down) down.onclick=function(){ runner.slower(); };
    });
  })();
  </script>
</body>
</html>
