name: Build and Deploy static site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build TypeScript
        run: npx tsc -p tsconfig.json --outFile public/app.js

      - name: Ensure start page exists
        run: |
          if [ ! -f public/index.html ]; then
            mkdir -p public
            echo '<!doctype html><html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>pin-graphic</title><link rel="stylesheet" href="styles.css" /></head><body><div id="app"></div><script src="app.js"></script></body></html>' > public/index.html
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site (public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Show Published URL
        run: |
          echo "Published URL: ${{ steps.deployment.outputs.page_url }}"
          echo "# ✅ Site Published" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
