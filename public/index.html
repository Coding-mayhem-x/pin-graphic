<!DOCTYPE html>

      </div>
          <section class="palette">

          <button id="btnAddRandomColor">Add random (selected)</button>"`r`n          <button id=\"btnAddRandomAny\">Add random (any)</button>"
        </div>
        <div class="palette-list" id="paletteList"></div>
